<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lobby</title>
</head>
<body>
    <h1>News Feed</h1>
    <a href="{% url 'add_product' %}">Add a Product</a>
    <ul>
        {% for product in products %}
        <li>
            <h2>{{ product.name }}</h2>
            <img src="{{ product.image.url }}" alt="{{ product.name }}" width="200">
            <p>{{ product.description }}</p>
            <p>Price: ${{ product.price }}</p>
            <p>Posted by: {{ product.seller.username }}</p>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
