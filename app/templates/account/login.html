{% extends "app/base.html" %}

{% block title %}Login - SellItNow{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card shadow-lg p-4" style="width: 400px;">
        <h2 class="text-center mb-4">Login to SellItNow</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_login" class="form-label">Email</label>
                <input type="text" name="login" id="id_login" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <div class="mt-3 text-center">
            <a href="{% url 'account_reset_password' %}" class="text-decoration-none">Forgot Password?</a> |
            <a href="{% url 'account_signup' %}" class="text-decoration-none">Register</a>
        </div>
    </div>
</div>
{% endblock %}
